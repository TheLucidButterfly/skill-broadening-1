
version: '3.8'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skillbroad
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build: ./api
    env_file:
      - ./api/.env.example
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis

  ui:
    build: ./ui
    ports:
      - '4200:80' # UI served by nginx in the container
    depends_on:
      - api

volumes:
  postgres-data:

networks: {}

